services:
  api:
    build: .
    container_name: FastAPI-Abstract
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
     - backend

  db:
    image: postgres
    container_name: FastPI-Abstract_DB
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
     - backend

  celery_worker:
    build: .
    container_name: celery_worker
    command: celery -A src.core.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
    env_file:
      - .env
    networks:
      - backend


  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

volumes:
  postgres_data:

networks:
 backend:
  driver: bridge
